- name: Install Docker på alle noder
  hosts: docker_cluster
  become: true

  tasks:
    - name: Installer dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        update_cache: yes

    - name: Tilføj Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Tilføj Docker repo
      apt_repository:
        repo: "deb https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Installer Docker
      apt:
        name: docker-ce
        state: latest
        update_cache: yes

    - name: Start Docker
      systemd:
        name: docker
        state: started
        enabled: true

    - name: Tilføj user til docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
