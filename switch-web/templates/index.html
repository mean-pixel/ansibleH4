<!DOCTYPE html>
<html>
<head>
    <title>Cisco Switch Config</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f6efff;
            color: #2f2142;
            max-width: 860px;
            margin: 40px auto;
            padding: 20px;

            /* 🌸 Blomster overlay */
            background-image:
                radial-gradient(circle at 15% 20%, rgba(170, 130, 255, 0.18) 0 40px, transparent 41px),
                radial-gradient(circle at 85% 25%, rgba(200, 160, 255, 0.14) 0 35px, transparent 36px),
                radial-gradient(circle at 40% 80%, rgba(150, 110, 255, 0.12) 0 50px, transparent 51px),
                radial-gradient(circle at 70% 70%, rgba(180, 140, 255, 0.10) 0 45px, transparent 46px),
                radial-gradient(circle at 10% 75%, rgba(210, 170, 255, 0.12) 0 30px, transparent 31px);

            background-attachment: fixed;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 18px;
            box-shadow: 
                0 10px 28px rgba(114, 74, 180, 0.12),
                0 0 40px rgba(170, 130, 255, 0.08);
            border: 1px solid #ddc8ff;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #b388ff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #9c6eff;
        }

        .result {
            margin-top: 20px;
            background: black;
            color: #00ff88;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
        }
    </style>
</head>

<body>

    <h1>Cisco Catalyst 9200L konfiguration</h1>

    <div class="card">
        <form method="post">

            <label>Switch</label>
            <select name="switch">
                <option value="SW01-Mette">SW01-Mette</option>
            </select>

            <label>Interface</label>
            <select name="interface">
                {% for i in range(1,25) %}
                    <option value="GigabitEthernet1/0/{{i}}">
                        GigabitEthernet1/0/{{i}}
                    </option>
                {% endfor %}
            </select>

            <label>Description</label>
            <input type="text" name="description" placeholder="Beskrivelse">

            <label>Mode</label>
            <select name="mode">
                <option value="access">Access</option>
                <option value="trunk">Trunk</option>
            </select>

            <label>Access VLAN</label>
            <input type="number" name="vlan_id" value="1">

            <button type="submit">Kør Ansible</button>

        </form>
    </div>

    {% if output %}
    <div class="result">
        {{ output }}
    </div>
    {% endif %}

</body>
</html>
