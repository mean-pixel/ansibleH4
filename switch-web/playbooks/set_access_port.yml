---
- name: Sæt access-port på Cisco switch
  hosts: "{{ switch }}"
  gather_facts: no

  tasks:
    - name: Opret VLAN hvis navn er angivet
      cisco.ios.ios_config:
        lines:
          - "vlan {{ vlan_id }}"
          - "name {{ vlan_name }}"
      when: vlan_name is defined and vlan_name | length > 0

    - name: Opret VLAN uden navn hvis intet navn er angivet
      cisco.ios.ios_config:
        lines:
          - "vlan {{ vlan_id }}"
      when: vlan_name is not defined or vlan_name | length == 0

    - name: Konfigurer access-port
      cisco.ios.ios_config:
        parents: "interface {{ interface }}"
        lines:
          - description {{ description }}
          - switchport mode access
          - switchport access vlan {{ vlan_id }}
          - spanning-tree portfast
          - spanning-tree bpduguard enable
          - no shutdown
